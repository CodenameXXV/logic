<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Логічні Загадки — Мультирежим</title>
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/CodenameXXV/logic/refs/heads/main/logic.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            overflow-x: hidden;
        }

        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(51, 65, 85, 1);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .blob {
            position: absolute;
            width: 500px;
            height: 500px;
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            filter: blur(120px);
            opacity: 0.15;
            z-index: -1;
            border-radius: 50%;
        }

        .answer-container {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s ease-out, opacity 0.4s ease;
            opacity: 0;
        }

        .answer-container.show {
            max-height: 200px;
            opacity: 1;
        }

        .fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .mode-btn.active {
            background-color: #4f46e5;
            color: white;
            border-color: #6366f1;
        }

        .quiz-option {
            transition: all 0.2s ease;
        }

        .quiz-option:hover:not(:disabled) {
            background-color: rgba(99, 102, 241, 0.1);
            border-color: #6366f1;
        }

        .correct { background-color: rgba(16, 185, 129, 0.4) !important; border-color: #10b981 !important; color: #10b981; font-weight: bold; }
        .wrong { background-color: rgba(239, 68, 68, 0.4) !important; border-color: #ef4444 !important; color: #ef4444; }

        #timer-bar {
            transition: width 0.1s linear;
        }

        .site-footer a, .sources-btn {
            color: #6366f1;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .site-footer a:hover, .sources-btn:hover {
            color: #818cf8;
            text-decoration: underline;
        }

        #modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(4px);
            z-index: 100;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        #modal-overlay.active {
            display: flex;
        }

        /* Fullscreen toggle button styles */
        #fullscreen-btn {
            position: fixed;
            top: 1rem;
            right: 1rem;
            z-index: 50;
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(51, 65, 85, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #94a3b8;
        }

        #fullscreen-btn:hover {
            background: rgba(51, 65, 85, 0.9);
            color: #6366f1;
            transform: scale(1.05);
        }

        #fullscreen-btn:active {
            transform: scale(0.95);
        }

        .fullscreen-icon {
            width: 20px;
            height: 20px;
            transition: transform 0.3s ease;
        }

        /* Hide fullscreen button when in fullscreen on mobile for better UX */
        @media (max-width: 640px) {
            #fullscreen-btn {
                width: 40px;
                height: 40px;
            }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">
    
    <!-- Fullscreen Toggle Button -->
    <button id="fullscreen-btn" title="На весь екран" onclick="toggleFullscreen()">
        <!-- Expand Icon (default) -->
        <svg id="icon-expand" class="fullscreen-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path>
        </svg>
        <!-- Collapse Icon (hidden by default) -->
        <svg id="icon-collapse" class="fullscreen-icon hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 1 2-2h3M3 16h3a2 2 0 0 1 2 2v3"></path>
        </svg>
    </button>

    <div class="blob -top-48 -left-48"></div>
    <div class="blob -bottom-48 -right-48"></div>

    <div id="modal-overlay" onclick="closeSources()">
        <div class="glass-card p-6 md:p-8 rounded-3xl max-w-lg w-full" onclick="event.stopPropagation()">
            <h3 class="text-xl font-bold mb-4 text-white">Джерела загадок</h3>
            <p class="text-slate-400 text-sm mb-4">Загадки взято з різних інтернет джерел:</p>
            <ul class="space-y-2 text-sm break-all">
                <li><a href="https://logiclike.com/uk/zagadki-na-logiku" target="_blank" class="text-indigo-400 hover:underline">logiclike.com/uk/zagadki-na-logiku</a></li>
                <li><a href="https://dovidka.biz.ua/zagadki-na-logiku/" target="_blank" class="text-indigo-400 hover:underline">dovidka.biz.ua/zagadki-na-logiku/</a></li>
                <li><a href="https://blog.eva.ua/35-zagadok-na-logiku-dlya-igor-z-druzyami/" target="_blank" class="text-indigo-400 hover:underline">blog.eva.ua/35-zagadok-na-logiku/</a></li>
            </ul>
            <button onclick="closeSources()" class="mt-6 w-full py-2 bg-slate-700 hover:bg-slate-600 rounded-xl text-white font-medium transition-colors">Закрити</button>
        </div>
    </div>

    <main class="z-10 w-full max-w-2xl flex-grow flex flex-col justify-center">
        <header class="text-center mb-8">
            <h1 class="text-4xl font-bold bg-gradient-to-r from-white to-slate-400 bg-clip-text text-transparent mb-6">
                Логічний Тренажер
            </h1>
            
            <div class="flex flex-wrap justify-center gap-2 mb-8">
                <button onclick="setMode('classic')" id="mode-classic" class="mode-btn px-4 py-2 rounded-full border border-slate-700 bg-slate-800/50 text-slate-400 text-sm font-semibold transition-all">Класика</button>
                <button onclick="setMode('quiz')" id="mode-quiz" class="mode-btn px-4 py-2 rounded-full border border-slate-700 bg-slate-800/50 text-slate-400 text-sm font-semibold transition-all">Вікторина (15)</button>
                <button onclick="setMode('marathon')" id="mode-marathon" class="mode-btn px-4 py-2 rounded-full border border-slate-700 bg-slate-800/50 text-slate-400 text-sm font-semibold transition-all">Марафон (15)</button>
            </div>
        </header>

        <div id="stats-bar" class="flex justify-between items-center mb-4 px-2 text-sm font-medium text-slate-400">
            <div id="score-display" class="hidden">Рахунок: <span id="score" class="text-indigo-400">0</span></div>
            <div id="timer-display" class="hidden flex items-center gap-2">
                <span>Час:</span>
                <div class="w-32 h-2 bg-slate-800 rounded-full overflow-hidden">
                    <div id="timer-bar" class="h-full bg-indigo-500" style="width: 100%"></div>
                </div>
            </div>
        </div>

        <div id="riddle-card" class="glass-card p-8 md:p-12 rounded-3xl shadow-2xl relative overflow-hidden fade-in">
            <div class="relative z-10 flex flex-col items-center text-center">
                <div class="flex items-center gap-2 mb-6 text-indigo-400 font-medium">
                    <span id="counter-seen" class="flex items-center justify-center min-w-8 h-8 px-2 rounded-lg bg-indigo-500/20 text-sm">1</span>
                    <span class="text-slate-500">з</span>
                    <span id="counter-total" class="text-slate-300">0</span>
                </div>

                <h2 id="riddle-text" class="text-xl md:text-2xl font-medium leading-relaxed mb-10 min-h-[80px] flex items-center justify-center">
                    Завантаження...
                </h2>

                <div id="classic-ui" class="w-full space-y-4">
                    <button id="toggle-answer" class="w-full py-4 px-6 rounded-2xl flex items-center justify-center gap-3 transition-all duration-300 font-semibold text-lg bg-indigo-600 hover:bg-indigo-500 text-white shadow-lg shadow-indigo-500/25">
                        Показати відповідь
                    </button>
                    <div id="answer-container" class="answer-container">
                        <div class="mt-4 p-6 bg-emerald-500/10 border border-emerald-500/30 rounded-2xl text-emerald-400 text-xl font-bold">
                            <span id="answer-text"></span>
                        </div>
                    </div>
                </div>

                <div id="quiz-ui" class="hidden w-full grid grid-cols-1 gap-3"></div>
            </div>
        </div>

        <div class="mt-10 mb-10 flex flex-col sm:flex-row gap-4 items-center justify-center">
            <button id="next-btn" class="group flex items-center gap-3 px-8 py-4 bg-white text-slate-900 rounded-full font-bold text-lg hover:bg-slate-200 transition-all shadow-xl hover:scale-105 active:scale-95">
                <span id="next-btn-text">Далі</span>
            </button>
            <div id="remaining-text" class="text-slate-500 text-sm font-medium"></div>
        </div>
    </main>

    <footer class="site-footer w-full py-8 text-slate-500 text-sm text-center border-t border-slate-800/50 mt-8">
        Автор: <a href="https://codenamexxv.github.io/teacher/" target="_blank" rel="noopener">Ігор Шуляк</a> • 
        <button onclick="openSources()" class="sources-btn">Джерела</button><br>
        © 2026 Логічні Загадки • <span id="mode-name">Класичний режим</span>
    </footer>

    <script>
        const RIDDLES_DATA = [
            { q: "З якого крана не можна помити руки?", a: "З будівельного", options: ["З холодного", "З будівельного", "З несправного", "З порожнього"] },
            { q: "Який годинник показує правильний час лише двічі на добу?", a: "Зламаний, який зупинився", options: ["Сонячний", "Пісочний", "Зламаний, який зупинився", "Електронний"] },
            { q: "Летіли качки: одна попереду і дві позаду, одна позаду і дві попереду, одна між двома та три в ряд. Скільки всього летіло качок?", a: "3", options: ["2", "3", "6", "5"] },
            { q: "Горять великий будинок і маленький. Який будинок гаситиме поліція?", a: "Жоден, поліція пожежі не гасить", options: ["Великий", "Маленький", "Обидва", "Жоден, поліція пожежі не гасить"] },
            { q: "Скільки та які місяці мають по 28 днів?", a: "Всі 12 місяців", options: ["Тільки лютий", "Всі 12 місяців", "Жоден", "Тільки високосні"] },
            { q: "Чому складні загадки небезпечні для голови?", a: "Тому що доводиться ламати над ними голову", options: ["Можна заснути", "Тому що доводиться ламати над ними голову", "Викликають втому", "Псують настрій"] },
            { q: "На гілці сидить ворона. Що треба зробити, щоб відпиляти гілку, не потривоживши її?", a: "Дочекатися, поки ворона полетить", options: ["Пилкувати тихо", "Дати їй їжу", "Дочекатися, поки ворона полетить", "Зв'язати ворону"] },
            { q: "Чим більше з неї береш, тим більшою вона стає.", a: "Яма", options: ["Хмара", "Яма", "Скарбничка", "Сумка"] },
            { q: "У клітці 3 папуги. Троє дівчат попросили дати їм по одному папузі. Кожній дівчинці дали папугу. І все ж у клітці залишився один папуга. Як так вийшло?", a: "Одній дівчинці дали папугу разом із кліткою", options: ["Одна дівчинка передумала", "Один папуга втік", "Одній дівчинці дали папугу разом із кліткою", "Принесли ще одного"] },
            { q: "Хто може підняти й пересунути коня і слона?", a: "Шахіст", options: ["Геркулес", "Шахіст", "Вантажник", "Директор зоопарку"] },
            { q: "В саду ростуть берези. На кожній із них по 5 великих гілок. На кожній великій гілці по 10 маленьких гілочок, а на кожній маленькій гілочці — по 1 яблуку. Скільки яблук росте на цьому дереві?", a: "Яблука на березах не ростуть", options: ["50 яблук", "500 яблук", "Жодного, яблука на березах не ростуть", "Залежить від сезону"] },
            { q: "Електричка їде на схід зі швидкістю 80 км/годину. В який бік летить дим?", a: "Електрички не димлять", options: ["На захід", "На схід", "Вгору", "Електрички не димлять"] },
            { q: "На аркуші паперу написано число 86. Як збільшити це число на 12, нічого не закреслюючи і не дописуючи?", a: "Перевернувши листок", options: ["Подивитися у дзеркало", "Перевернувши листок", "Скласти папір", "Нагріти аркуш"] },
            { q: "Якою рукою потрібно розмішувати чай?", a: "Чай потрібно розмішувати ложкою", options: ["Правою", "Лівою", "Чай потрібно розмішувати ложкою", "Обома"] },

            { q: "Що робити, якщо ви сіли до машини і зібралися їхати, а ноги не дістають до педалей?", a: "Пересісти на сидіння водія", options: ["Купити нове авто", "Пересісти на сидіння водія", "Викликати евакуатор", "Надіти взуття на платформі"] },
            { q: "«Зав'язати» можна, а розв'язати не вдасться.", a: "Розмова", options: ["Шнурки", "Вузол", "Розмова", "Стрічку"] },

            { q: "Яке слово у словнику написано неправильно?", a: "Це слово «неправильно»", options: ["Помилка", "Словник", "«Неправильно»", "Абетка"] },
            { q: "Що стане краще, якщо його потоптати?", a: "Стежина", options: ["Трава", "Стежина", "Килим", "Взуття"] },

            { q: "Що вийде, якщо барабан розділити на барабан?", a: "Барабанна дріб", options: ["Одиниця", "Нуль", "Барабанна дріб", "Нічого"] },
            { q: "Чому жодне волосся на голові чоловіка не промокло під дощем?", a: "Він був абсолютно лисим", options: ["Мав парасольку", "Він був абсолютно лисим", "Був у капелюсі", "Швидко біг"] },
            { q: "Назви її по імені й вона зникне.", a: "Тиша", options: ["Луна", "Мрія", "Тиша", "Таємниця"] },

            { q: "Не махає крилом, але літає; не птах, але птахів обганяє.", a: "Літак", options: ["Хмара", "Літак", "Вітер", "Комар"] },
            { q: "Що це таке: чотири кольори мають, раз в три місяці їх змінюють?", a: "Пори року", options: ["Прапори", "Пори року", "Світлофори", "Шпалери"] },
            { q: "Я зустрів її випадково. Я намагався її дістати, але вона йшла все далі і далі. Що це?", a: "Скалка", options: ["Тінь", "Скалка", "Мрія", "Бджола"] },
            { q: "Хто в небі народився і в землі поховався?", a: "Дощ", options: ["Сонце", "Дощ", "Метеорит", "Туман"] },
            { q: "У дворі 3 собаки і 4 коти. Скільки лап у дворі?", a: "28 лап", options: ["14 лап", "28 лап", "7 лап", "24 лапи"] },
            { q: "Що можна побачити з закритими очима?", a: "Сон", options: ["Темряву", "Сон", "Нічого", "Майбутнє"] },
            { q: "Що завжди зростає, але ніколи не зменшується?", a: "Вік", options: ["Дерево", "Борг", "Вік", "Ціна"] },
            { q: "Що можна витратити, але не можна зберегти?", a: "Час", options: ["Гроші", "Час", "Сили", "Енергію"] },
            { q: "Бочка з водою важить 50 кг. Що потрібно додати, щоб вона важила 15 кг?", a: "Дірку", options: ["Лід", "Дірку", "Сіль", "Нічого"] },
            { q: "Що біжить, але не має ніг?", a: "Вода або час", options: ["Автомобіль", "Вода або час", "Вітер", "Тінь"] },
            { q: "Яке число збільшиться на півтора раза, якщо його перевернути?", a: "Число 6", options: ["9", "6", "8", "1"] },
            { q: "Скільки місяців у році мають 28 днів?", a: "Всі 12", options: ["1", "12", "6", "2"] },
            { q: "Що має голову, але не має мозку?", a: "Часник або цибуля", options: ["Стіл", "Часник або цибуля", "Книга", "Лялька"] },
            { q: "Що можна зламати, навіть не торкаючись до нього?", a: "Обіцянку", options: ["Склянку", "Обіцянку", "Гілку", "Мовчання"] }
        ];

        let state = {
            mode: 'classic',
            remainingIndices: [],
            currentIndex: null,
            seenCount: 0,
            score: 0,
            timer: null,
            timeLeft: 12,
            canAnswer: true,
            totalLimit: 0
        };

        const elements = {
            riddleText: document.getElementById('riddle-text'),
            answerText: document.getElementById('answer-text'),
            answerContainer: document.getElementById('answer-container'),
            toggleBtn: document.getElementById('toggle-answer'),
            nextBtn: document.getElementById('next-btn'),
            quizUi: document.getElementById('quiz-ui'),
            classicUi: document.getElementById('classic-ui'),
            scoreDisplay: document.getElementById('score-display'),
            timerDisplay: document.getElementById('timer-display'),
            timerBar: document.getElementById('timer-bar'),
            scoreVal: document.getElementById('score'),
            modeName: document.getElementById('mode-name'),
            counterTotal: document.getElementById('counter-total'),
            counterSeen: document.getElementById('counter-seen')
        };

        // Fullscreen toggle functionality
        function toggleFullscreen() {
            const btn = document.getElementById('fullscreen-btn');
            const iconExpand = document.getElementById('icon-expand');
            const iconCollapse = document.getElementById('icon-collapse');
            
            if (!document.fullscreenElement) {
                // Enter fullscreen
                if (document.documentElement.requestFullscreen) {
                    document.documentElement.requestFullscreen();
                } else if (document.documentElement.webkitRequestFullscreen) {
                    document.documentElement.webkitRequestFullscreen();
                } else if (document.documentElement.msRequestFullscreen) {
                    document.documentElement.msRequestFullscreen();
                }
            } else {
                // Exit fullscreen
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                } else if (document.webkitExitFullscreen) {
                    document.webkitExitFullscreen();
                } else if (document.msExitFullscreen) {
                    document.msExitFullscreen();
                }
            }
        }

        // Listen for fullscreen change events
        document.addEventListener('fullscreenchange', updateFullscreenButton);
        document.addEventListener('webkitfullscreenchange', updateFullscreenButton);
        document.addEventListener('msfullscreenchange', updateFullscreenButton);

        function updateFullscreenButton() {
            const iconExpand = document.getElementById('icon-expand');
            const iconCollapse = document.getElementById('icon-collapse');
            const btn = document.getElementById('fullscreen-btn');
            
            if (document.fullscreenElement || document.webkitFullscreenElement || document.msFullscreenElement) {
                // In fullscreen mode - show collapse icon
                iconExpand.classList.add('hidden');
                iconCollapse.classList.remove('hidden');
                btn.title = "Вийти з повноекранного режиму";
            } else {
                // Normal mode - show expand icon
                iconExpand.classList.remove('hidden');
                iconCollapse.classList.add('hidden');
                btn.title = "На весь екран";
            }
        }

        function openSources() {
            document.getElementById('modal-overlay').classList.add('active');
        }

        function closeSources() {
            document.getElementById('modal-overlay').classList.remove('active');
        }

        function setMode(newMode) {
            state.mode = newMode;
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`mode-${newMode}`).classList.add('active');
            
            elements.classicUi.classList.toggle('hidden', newMode !== 'classic');
            elements.quizUi.classList.toggle('hidden', newMode === 'classic');
            elements.scoreDisplay.classList.toggle('hidden', newMode === 'classic');
            elements.timerDisplay.classList.toggle('hidden', newMode !== 'marathon');
            
            elements.modeName.textContent = {
                classic: "Класичний режим",
                quiz: "Режим Вікторини",
                marathon: "Марафон на час"
            }[newMode];

            initGame();
        }

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function initGame() {
            clearInterval(state.timer);
            
            let pool = Array.from({ length: RIDDLES_DATA.length }, (_, i) => i);
            shuffle(pool);

            if (state.mode === 'quiz' || state.mode === 'marathon') {
                state.remainingIndices = pool.slice(0, 15);
                state.totalLimit = 15;
            } else {
                state.remainingIndices = pool;
                state.totalLimit = RIDDLES_DATA.length;
            }

            state.seenCount = 0;
            state.score = 0;
            elements.scoreVal.textContent = "0";
            elements.counterTotal.textContent = state.totalLimit;
            nextRiddle();
        }

        function nextRiddle() {
            if (state.remainingIndices.length === 0) {
                elements.riddleText.innerHTML = `
                    <div class="space-y-4">
                        <p class="text-2xl font-bold text-indigo-400">Кінець гри!</p>
                        <p class="text-lg">Ваш фінальний результат: <span class="text-white font-bold">${state.score}</span>.</p>
                    </div>
                `;
                elements.quizUi.innerHTML = "";
                document.getElementById('next-btn-text').textContent = "Почати знову";
                elements.nextBtn.onclick = initGame;
                return;
            }

            elements.nextBtn.onclick = nextRiddle;
            state.canAnswer = true;
            state.currentIndex = state.remainingIndices.pop();
            state.seenCount++;
            
            const current = RIDDLES_DATA[state.currentIndex];
            const card = document.getElementById('riddle-card');
            card.classList.remove('fade-in');
            void card.offsetWidth;
            card.classList.add('fade-in');

            elements.riddleText.textContent = current.q;
            elements.counterSeen.textContent = state.seenCount;
            document.getElementById('remaining-text').textContent = `Залишилось: ${state.remainingIndices.length}`;
            document.getElementById('next-btn-text').textContent = "Наступне";

            if (state.mode === 'classic') {
                elements.answerText.textContent = current.a;
                elements.answerContainer.classList.remove('show');
                elements.toggleBtn.textContent = "Показати відповідь";
            } else {
                renderQuizOptions(current);
            }

            if (state.mode === 'marathon') {
                startTimer();
            }
        }

        function renderQuizOptions(riddle) {
            elements.quizUi.innerHTML = "";
            const options = shuffle([...riddle.options]);
            
            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "quiz-option w-full p-4 rounded-xl border border-slate-700 bg-slate-800/40 text-left font-medium hover:bg-slate-700/50 transition-all";
                btn.textContent = opt;
                btn.onclick = () => handleQuizAnswer(opt, riddle.a, btn);
                elements.quizUi.appendChild(btn);
            });
        }

        function normalizeText(text) {
            if (!text) return "";
            return text.replace(/[.«»"']/g, '').trim().toLowerCase();
        }

        function handleQuizAnswer(selected, correct, btn) {
            if (!state.canAnswer) return;
            state.canAnswer = false;
            clearInterval(state.timer);

            const normSelected = normalizeText(selected);
            const normCorrect = normalizeText(correct);
            
            const isCorrect = normSelected === normCorrect || 
                             (normCorrect.includes(normSelected) && normSelected.length > 3) ||
                             (normSelected.includes(normCorrect) && normCorrect.length > 3);
            
            if (isCorrect && selected !== null) {
                state.score += 10;
                if (btn) btn.classList.add('correct');
            } else {
                if (btn) btn.classList.add('wrong');
                Array.from(elements.quizUi.children).forEach(b => {
                    if (normalizeText(b.textContent) === normCorrect) {
                        b.classList.add('correct');
                    }
                });
            }
            elements.scoreVal.textContent = state.score;
        }

        function startTimer() {
            state.timeLeft = 12;
            elements.timerBar.style.width = "100%";
            clearInterval(state.timer);
            
            state.timer = setInterval(() => {
                state.timeLeft -= 0.1;
                const percent = (state.timeLeft / 12) * 100;
                elements.timerBar.style.width = `${percent}%`;

                if (state.timeLeft <= 0) {
                    clearInterval(state.timer);
                    handleQuizAnswer(null, RIDDLES_DATA[state.currentIndex].a, null);
                }
            }, 100);
        }

        elements.toggleBtn.onclick = () => {
            elements.answerContainer.classList.toggle('show');
            const isShow = elements.answerContainer.classList.contains('show');
            elements.toggleBtn.textContent = isShow ? "Сховати відповідь" : "Показати відповідь";
        };

        window.onload = () => {
            setMode('classic');
            // Initialize fullscreen button state
            updateFullscreenButton();
        };
    </script>
</body>
</html>
